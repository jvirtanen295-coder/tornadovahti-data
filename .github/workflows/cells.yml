name: Seuraa tutkasoluja

on:
  schedule:
    - cron: "*/10 * * * *"   # 10 min valein (GitHub voi viivastyttaa hieman)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy

jobs:
  cells:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Asenna kirjastot
        run: pip install requests numpy pillow scipy
      - name: Tunnista ja seuraa soluja
        run: python scripts/track_cells.py
      - name: Julkaise GitHub Pagesiin
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: false
