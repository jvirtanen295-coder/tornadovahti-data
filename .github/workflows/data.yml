name: Paivita saadata

on:
  schedule:
    - cron: "23 */3 * * *"   # joka 3. tunti
  workflow_dispatch: {}       # ja napista milloin vain

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy

jobs:
  data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Asenna eccodes-kirjasto
        run: sudo apt-get update && sudo apt-get install -y libeccodes-dev

      - name: Asenna Python-kirjastot
        run: pip install ecmwf-opendata cfgrib eccodes xarray numpy metpy

      - name: Laske indeksit (Pori)
        run: python scripts/fetch_data.py

      - name: Julkaise GitHub Pagesiin
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: false
